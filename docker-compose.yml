services:
  mysql:
    image: mysql:8.0
    container_name: demo-mysql
    mem_limit: 1g
    dns:
      - 8.8.8.8
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: health_iot
      MYSQL_TCP_PORT: 3306
    ports:
      - "127.0.0.1:13306:3306"
    volumes:
      - ./data/mysql:/var/lib/mysql
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    healthcheck:
      test: ["CMD", "mysqladmin" ,"ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7.2
    container_name: demo-redis
    mem_limit: 128m
    dns:
      - 8.8.8.8
    restart: always
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - ./data/redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  zookeeper:
    image: zookeeper:3.9.2
    container_name: demo-zookeeper
    mem_limit: 256m
    dns:
      - 8.8.8.8
    restart: always
    ports:
      - "127.0.0.1:2181:2181"
    environment:
      - ALLOW_ANONYMOUS_LOGIN=no
    volumes:
      - ./data/zookeeper:/data
    healthcheck:
      test: ["CMD-SHELL", "zkServer.sh status || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 40s

  kafka:
    image: bitnamilegacy/kafka:3.6.1
    container_name: demo-kafka
    mem_limit: 1g
    dns:
      - 8.8.8.8
    restart: always
    ports:
      - "127.0.0.1:9092:9092"
    environment:
      - KAFKA_CFG_ZOOKEEPER_CONNECT=zookeeper:2181
      - KAFKA_CFG_LISTENERS=PLAINTEXT://0.0.0.0:9092
      - KAFKA_CFG_ADVERTISED_LISTENERS=PLAINTEXT://127.0.0.1:9092
      - ALLOW_PLAINTEXT_LISTENER=yes
      - KAFKA_HEAP_OPTS=-Xmx512m -Xms256m
    volumes:
      - ./data/kafka:/bitnami/kafka
    depends_on:
      - zookeeper

  emqx:
    image: emqx/emqx:5.3.0
    container_name: demo-emqx
    mem_limit: 512m
    dns:
      - 8.8.8.8
    restart: always
    ports:
      - "127.0.0.1:1883:1883"
      - "127.0.0.1:8083:8083"
      - "127.0.0.1:8084:8084"
      - "127.0.0.1:8883:8883"
      - "127.0.0.1:18083:18083"
    environment:
      - EMQX_NODE_NAME=emqx@127.0.0.1
      - EMQX_DASHBOARD__DEFAULT_USERNAME=admin
      - EMQX_DASHBOARD__DEFAULT_PASSWORD=public
      - EMQX_ALLOW_ANONYMOUS=false
    volumes:
      - ./data/emqx:/opt/emqx/data
    healthcheck:
      test: ["CMD", "/opt/emqx/bin/emqx_ctl", "status"]
      interval: 10s
      timeout: 5s
      retries: 5

  tdengine:
    image: tdengine/tdengine:3.3.0.0
    container_name: demo-tdengine
    mem_limit: 1g
    ulimits:
      nofile:
        soft: 1048576
        hard: 1048576
    hostname: tdengine
    restart: always
    ports:
      - "127.0.0.1:6030:6030"
      - "127.0.0.1:6041:6041"
      - "127.0.0.1:6042:6042"
    environment:
      - TZ=Asia/Shanghai
      - TAOS_FIRST_EP=tdengine:6030
      - TAOS_SERVER_PORT=6030
      - TAOS_FQDN=tdengine
    volumes:
      - ./data/tdengine/data:/var/lib/taos
      - ./data/tdengine/log:/var/log/taos
