spring.application.name=demo
server.port=8080

spring.datasource.url=${DB_URL:jdbc:mysql://127.0.0.1:13306/health_iot?useUnicode=true&characterEncoding=UTF-8&serverTimezone=Asia/Shanghai&createDatabaseIfNotExist=true&autoReconnect=true&failOverReadOnly=false&connectTimeout=5000&socketTimeout=30000&tcpKeepAlive=true&sslMode=DISABLED&allowPublicKeyRetrieval=true}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:root}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
# HikariCP 连接池（支持 40 台设备并发上报）
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.max-lifetime=600000
# 每 30 秒向 MySQL 发送一次 keepalive ping，防止连接被 MySQL/NAT 静默关闭
spring.datasource.hikari.keepalive-time=15000
spring.datasource.hikari.connection-test-query=SELECT 1
spring.datasource.hikari.validation-timeout=3000
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

spring.data.redis.host=localhost
spring.data.redis.port=6379

# Kafka
app.kafka.enabled=true
spring.kafka.bootstrap-servers=${KAFKA_BOOTSTRAP_SERVERS:127.0.0.1:9092}
app.mock-data-enabled=${MOCK_DATA_ENABLED:false}

management.endpoints.web.exposure.include=health,metrics,prometheus
management.endpoint.health.show-details=always

# 初始管理员密码哈希，生产环境请通过 ADMIN_PASSWORD_HASH 环境变量覆盖
# 默认值对应密码: Admin@123 (首次登录后请立即修改)
app.admin-password-hash=${ADMIN_PASSWORD_HASH:$2a$10$7JB720yubVSZv5W8vNGkarO6zBcJuYoGGNELFHU9QuCdVqap1.a}

app.jwt.secret=${JWT_SECRET:health-iot-dev-jwt-secret-change-me-2026}
app.jwt.expire-seconds=7200

app.emqx.broker-url=${EMQX_BROKER_URL:tcp://localhost:1883}
app.emqx.username=${EMQX_USERNAME:admin}
app.emqx.password=${EMQX_PASSWORD:public}
app.emqx.client-id=health-server

app.tdengine.url=${TDENGINE_URL:jdbc:TAOS-RS://localhost:6041/pension?timezone=Asia/Shanghai}
app.tdengine.username=${TDENGINE_USERNAME:root}
app.tdengine.password=${TDENGINE_PASSWORD:taosdata}

# Swagger / OpenAPI
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.tags-sorter=alpha
