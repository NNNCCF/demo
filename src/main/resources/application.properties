spring.application.name=demo
server.port=8080
server.forward-headers-strategy=framework

spring.datasource.url=${DB_URL:jdbc:mysql://localhost:13306/health_iot?useUnicode=true&characterEncoding=UTF-8&serverTimezone=Asia/Shanghai&createDatabaseIfNotExist=true&autoReconnect=true&failOverReadOnly=false&socketTimeout=60000}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:root}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
# HikariCP иҝһжҺҘжұ пјҲж”ҜжҢҒ 40 еҸ°и®ҫеӨҮе№¶еҸ‘дёҠжҠҘпјү
spring.datasource.hikari.maximum-pool-size=40
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.max-lifetime=600000
# жҜҸ 30 з§’еҗ‘ MySQL еҸ‘йҖҒдёҖж¬Ў keepalive pingпјҢйҳІжӯўиҝһжҺҘиў« MySQL/NAT йқҷй»ҳе…ій—ӯ
spring.datasource.hikari.keepalive-time=30000
spring.datasource.hikari.connection-test-query=SELECT 1
spring.datasource.hikari.validation-timeout=3000
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}
spring.data.redis.password=${REDIS_PASSWORD:}

# Kafka
app.kafka.enabled=true
spring.kafka.bootstrap-servers=${KAFKA_BOOTSTRAP_SERVERS:127.0.0.1:9092}
app.mock-data-enabled=${MOCK_DATA_ENABLED:false}

management.endpoints.web.exposure.include=${MANAGEMENT_ENDPOINTS_EXPOSURE:health}
management.endpoint.health.show-details=never

# еҲқе§Ӣз®ЎзҗҶе‘ҳеҜҶз Ғе“ҲеёҢпјҢз”ҹдә§зҺҜеўғиҜ·йҖҡиҝҮ ADMIN_PASSWORD_HASH зҺҜеўғеҸҳйҮҸиҰҶзӣ–
# й»ҳи®ӨеҖјеҜ№еә”еҜҶз Ғ: Admin@123 (йҰ–ж¬Ўзҷ»еҪ•еҗҺиҜ·з«ӢеҚідҝ®ж”№)
app.admin-password-hash=${ADMIN_PASSWORD_HASH:$2a$10$7JB720yubVSZv5W8vNGkarO6zBcJuYoGGNELFHU9QuCdVqap1.a}

app.jwt.secret=${JWT_SECRET:health-iot-dev-jwt-secret-change-me-2026}
app.jwt.expire-seconds=7200
app.miniapp.signature-enabled=${MINIAPP_SIGNATURE_ENABLED:true}
app.miniapp.client-id=${MINIAPP_CLIENT_ID:zkab-miniapp}
app.miniapp.shared-secret=${MINIAPP_SHARED_SECRET:change-me-miniapp-shared-secret}
app.miniapp.allowed-clock-skew-seconds=${MINIAPP_ALLOWED_CLOCK_SKEW_SECONDS:300}
app.miniapp.nonce-ttl-seconds=${MINIAPP_NONCE_TTL_SECONDS:300}
app.exposure.swagger-public=${SWAGGER_PUBLIC:false}
app.exposure.actuator-public=${ACTUATOR_PUBLIC:false}

app.emqx.broker-url=${EMQX_BROKER_URL:tcp://localhost:1883}
app.emqx.username=${EMQX_USERNAME:admin}
app.emqx.password=${EMQX_PASSWORD:public}
app.emqx.client-id=health-server

app.tdengine.url=${TDENGINE_URL:jdbc:TAOS-RS://localhost:6041/pension?timezone=Asia/Shanghai}
app.tdengine.username=${TDENGINE_USERNAME:root}
app.tdengine.password=${TDENGINE_PASSWORD:taosdata}

app.captcha.base-url=${CAPTCHA_BASE_URL:https://v2.xxapi.cn/api/captcha}
app.captcha.api-key=${CAPTCHA_API_KEY:}
app.captcha.width=${CAPTCHA_WIDTH:150}
app.captcha.height=${CAPTCHA_HEIGHT:50}
app.captcha.length=${CAPTCHA_LENGTH:4}
app.captcha.type=${CAPTCHA_TYPE:string}
app.captcha.session-ttl-seconds=${CAPTCHA_SESSION_TTL_SECONDS:300}
app.captcha.cooldown-seconds=${CAPTCHA_COOLDOWN_SECONDS:60}

# Swagger / OpenAPI
springdoc.api-docs.enabled=${SPRINGDOC_ENABLED:false}
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.enabled=${SPRINGDOC_ENABLED:false}
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.tags-sorter=alpha
